spring:
  application:
    name: odonta-identity
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/odonta}
    username: ${SPRING_DATASOURCE_USERNAME:odonta}
    password: ${SPRING_DATASOURCE_PASSWORD:odonta}
  flyway:
    table: flyway_schema_history_identity
    locations: classpath:db/migration,classpath:db/authorization
    placeholders:
      authorizationSchema: identity_events
  jpa:
    hibernate:
      ddl-auto: validate
  modulith:
    events:
      jdbc:
        schema: identity_events
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${odonta.identity.keycloak.base-url}/realms/${odonta.identity.keycloak.realm}}

odonta:
  api:
    version: v1
    base-path: /api/${odonta.api.version}
  identity:
    session:
      cookie-name: odonta.session
      ttl: 8h
    keycloak:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:odonta}
      client-id: ${KEYCLOAK_CLIENT_ID:odonta-identity}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:}
      user-id-claim-client-ids:
        - ${odonta.identity.keycloak.client-id}
        - identity
        - billing
        - clinic
        - invite

server:
  port: ${IDENTITY_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
