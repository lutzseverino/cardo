spring:
  application:
    name: cardo-identity
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardo}
    username: ${SPRING_DATASOURCE_USERNAME:cardo}
    password: ${SPRING_DATASOURCE_PASSWORD:cardo}
  flyway:
    table: flyway_schema_history_identity
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration,classpath:db/authorization/publications
    placeholders:
      authorizationSchema: identity_events
  jpa:
    hibernate:
      ddl-auto: validate
  modulith:
    events:
      jdbc:
        schema: identity_events
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${cardo.identity.keycloak.base-url}/realms/${cardo.identity.keycloak.realm}}

cardo:
  api:
    version: v1
    base-path: /api/${cardo.api.version}
  identity:
    session:
      mode: ${IDENTITY_SESSION_MODE:local}
      access-cookie-name: ${IDENTITY_ACCESS_COOKIE_NAME:cardo.session}
      refresh-cookie-name: ${IDENTITY_REFRESH_COOKIE_NAME:cardo.refresh}
      csrf-cookie-name: ${IDENTITY_CSRF_COOKIE_NAME:cardo.csrf}
      refresh-cookie-path: ${IDENTITY_REFRESH_COOKIE_PATH:${cardo.api.base-path}/identity/sessions/current}
      secure: ${IDENTITY_SESSION_SECURE:false}
    keycloak:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:cardo}
      client-id: ${KEYCLOAK_CLIENT_ID:cardo-identity}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:}
      credential-setup-client-id: ${KEYCLOAK_CREDENTIAL_SETUP_CLIENT_ID:cardo-web}
      credential-setup-redirect-uri: ${KEYCLOAK_CREDENTIAL_SETUP_REDIRECT_URI:http://localhost:3000/invitations/completed}
      user-id-claim-client-ids:
        - ${cardo.identity.keycloak.client-id}
        - identity
        - billing
    operations:
      dispatch-delay: ${IDENTITY_OPERATION_DISPATCH_DELAY:5s}
      poll-delay: ${IDENTITY_OPERATION_POLL_DELAY:15s}
      credential-setup-timeout: ${KEYCLOAK_CREDENTIAL_SETUP_LIFESPAN:24h}
      retry-base-delay: ${IDENTITY_OPERATION_RETRY_BASE_DELAY:5s}
      claim-lease: ${IDENTITY_OPERATION_CLAIM_LEASE:1m}
      max-attempts: ${IDENTITY_OPERATION_MAX_ATTEMPTS:12}
      batch-size: ${IDENTITY_OPERATION_BATCH_SIZE:50}
    provider-mutations:
      dispatch-delay: ${IDENTITY_PROVIDER_MUTATION_DISPATCH_DELAY:5s}
      retry-base-delay: ${IDENTITY_PROVIDER_MUTATION_RETRY_BASE_DELAY:5s}
      claim-lease: ${IDENTITY_PROVIDER_MUTATION_CLAIM_LEASE:1m}
      max-attempts: ${IDENTITY_PROVIDER_MUTATION_MAX_ATTEMPTS:12}
      batch-size: ${IDENTITY_PROVIDER_MUTATION_BATCH_SIZE:50}

server:
  port: ${IDENTITY_PORT:8081}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    build:
      enabled: true

springdoc:
  paths-to-match: ${cardo.api.base-path}/**
  api-docs:
    path: /openapi.json
    version: OPENAPI_3_0
  swagger-ui:
    path: /docs
