spring:
  application:
    name: cardo-billing
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardo}
    username: ${SPRING_DATASOURCE_USERNAME:cardo}
    password: ${SPRING_DATASOURCE_PASSWORD:cardo}
  flyway:
    table: flyway_schema_history_billing
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${cardo.billing.keycloak.base-url}/realms/${cardo.billing.keycloak.realm}}

cardo:
  api:
    version: v1
    base-path: /api/${cardo.api.version}
  billing:
    customer-provisioning:
      dispatch-delay: ${BILLING_CUSTOMER_PROVISIONING_DISPATCH_DELAY:5s}
      retry-base-delay: ${BILLING_CUSTOMER_PROVISIONING_RETRY_BASE_DELAY:10s}
      claim-lease: ${BILLING_CUSTOMER_PROVISIONING_CLAIM_LEASE:1m}
      max-attempts: ${BILLING_CUSTOMER_PROVISIONING_MAX_ATTEMPTS:6}
      batch-size: ${BILLING_CUSTOMER_PROVISIONING_BATCH_SIZE:50}
    keycloak:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:cardo}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      checkout-prices: []

server:
  port: ${BILLING_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
