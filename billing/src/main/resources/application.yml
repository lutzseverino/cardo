spring:
  application:
    name: odonta-billing
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/odonta}
    username: ${SPRING_DATASOURCE_USERNAME:odonta}
    password: ${SPRING_DATASOURCE_PASSWORD:odonta}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${odonta.billing.keycloak.base-url}/realms/${odonta.billing.keycloak.realm}}

odonta:
  api:
    version: v1
    base-path: /api/${odonta.api.version}
  billing:
    keycloak:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:odonta}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      prices:
        - id: ${STRIPE_CLINIC_PRICE_ID:}
          product: clinic
          tenant-limit: ${STRIPE_CLINIC_TENANT_LIMIT:1}
          seat-limit: ${STRIPE_CLINIC_SEAT_LIMIT:5}

server:
  port: ${BILLING_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
