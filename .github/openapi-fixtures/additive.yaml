openapi: 3.0.3
info:
  title: Compatibility fixture
  version: 1.1.0
paths:
  /widgets:
    get:
      operationId: listWidgets
      responses:
        "200":
          description: Widgets found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Widget"
  /widgets/{widgetId}:
    parameters:
      - name: widgetId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getWidget
      responses:
        "200":
          description: Widget found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
components:
  schemas:
    Widget:
      type: object
      required: [id]
      properties:
        id:
          type: string
        label:
          type: string
