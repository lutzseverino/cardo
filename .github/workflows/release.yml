name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SemVer release version
        required: true
        type: string
      revision:
        description: Exact full commit SHA currently at main
        required: true
        type: string
      release_notes:
        description: Curated consumer impact, deprecations, and migration notes
        required: true
        type: string

concurrency:
  group: cardo-global-release
  cancel-in-progress: false

permissions: {}

env:
  RELEASE_NOTES: ${{ inputs.release_notes }}
  RELEASE_REVISION: ${{ inputs.revision }}
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  candidate:
    outputs:
      github_prerelease: ${{ steps.release-request.outputs.github_prerelease }}
    permissions:
      contents: read
      vulnerability-alerts: read
    runs-on: ubuntu-24.04
    steps:
      - name: Reject non-resumable partial prereleases
        run: |
          case "$RELEASE_VERSION" in
            0.1.0-rc.1)
              echo '0.1.0-rc.1 is a non-resumable runtime exposure incident; choose a new, unused version.' >&2
              exit 1
              ;;
            0.1.0-rc.2)
              echo '0.1.0-rc.2 is a non-resumable public-Maven-only partial prerelease; choose a new, unused version.' >&2
              exit 1
              ;;
            0.1.0-rc.4)
              echo '0.1.0-rc.4 is a non-resumable public-Maven-only partial prerelease with invalid vulnerability evidence; choose a new, unused version.' >&2
              exit 1
              ;;
          esac
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.revision }}
      - name: Restore preserved release anchor
        id: release-anchor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-anchor"
          if draft=$(gh release view "v$RELEASE_VERSION" --json isDraft --jq .isDraft 2>/dev/null); then
            [[ $draft == true ]] || { echo "v$RELEASE_VERSION is already published" >&2; exit 1; }
            gh release download "v$RELEASE_VERSION" \
              --pattern release-manifest.json --pattern central-bundle.zip \
              --dir "$RUNNER_TEMP/release-anchor"
            echo 'restored=true' >>"$GITHUB_OUTPUT"
          else
            echo 'restored=false' >>"$GITHUB_OUTPUT"
          fi
      - name: Validate immutable release request
        id: release-request
        run: |
          [[ -n "${RELEASE_NOTES//[[:space:]]/}" ]] || { echo 'release notes are required' >&2; exit 1; }
          anchor=()
          if [[ '${{ steps.release-anchor.outputs.restored }}' == true ]]; then
            anchor+=("$RUNNER_TEMP/release-anchor/release-manifest.json")
            anchor+=("$RUNNER_TEMP/release-anchor/central-bundle.zip")
          fi
          scripts/release/validate-request.sh "$RELEASE_VERSION" "$RELEASE_REVISION" "${anchor[@]}"
          echo "github_prerelease=$(scripts/release/validate-version.py \
            "$RELEASE_VERSION" --github-prerelease)" >>"$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install contract tools
        env:
          OASDIFF_SHA256: 76f0307718c9196f44b5efc2a8b27e8a7ccde9beddd456159b8fb18377801636
          OASDIFF_VERSION: 1.24.0
        run: |
          npm ci
          archive="$RUNNER_TEMP/oasdiff.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "$OASDIFF_SHA256  $archive" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" oasdiff
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run canonical validation
        run: ./mvnw --batch-mode --no-transfer-progress verify
      - name: Smoke runtime artifacts
        run: scripts/smoke-runtime-artifacts.sh
      - name: Exercise compatibility fixtures
        run: |
          .github/scripts/test-openapi-fixtures.sh "$RUNNER_TEMP/oasdiff"
          scripts/release/test-compatibility-fixtures.sh
      - name: Stage allowlisted Maven candidate
        run: scripts/release/stage-maven.sh "$RELEASE_VERSION" "$RELEASE_REVISION" "$RUNNER_TEMP/candidate"
      - name: Match candidate to preserved release anchor
        if: steps.release-anchor.outputs.restored == 'true'
        run: |
          scripts/release/validate-request.sh "$RELEASE_VERSION" "$RELEASE_REVISION" \
            "$RUNNER_TEMP/release-anchor/release-manifest.json" \
            "$RUNNER_TEMP/release-anchor/central-bundle.zip" \
            "$RUNNER_TEMP/candidate/central-bundle.zip"
      - name: Prove fresh standalone consumer
        run: scripts/release/verify-consumer.sh "$RELEASE_VERSION" "$RUNNER_TEMP/candidate/maven-repository"
      - name: Bundle release OpenAPI contracts
        run: .github/scripts/bundle-openapi.sh . "$RUNNER_TEMP/candidate/openapi"
      - name: Select and compare previous stable release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/release/fetch-previous-stable.sh "$RUNNER_TEMP/previous-release-manifest.json"
          if [[ -s "$RUNNER_TEMP/previous-release-manifest.json" ]]; then
            previous_version=$(jq --raw-output .version "$RUNNER_TEMP/previous-release-manifest.json")
            previous_revision=$(jq --raw-output .sourceRevision "$RUNNER_TEMP/previous-release-manifest.json")
            scripts/release/download-previous-maven.sh \
              "$RUNNER_TEMP/previous-release-manifest.json" "$RUNNER_TEMP/previous-maven"
            scripts/release/compare-java-api.sh \
              "$RUNNER_TEMP/previous-maven" "$previous_version" \
              "$RUNNER_TEMP/candidate/maven-repository" "$RELEASE_VERSION" \
              "$previous_revision" "$RUNNER_TEMP/java-compatibility"
            set +e
            scripts/release/compare-released-openapi.sh \
              "$RUNNER_TEMP/previous-release-manifest.json" "$RUNNER_TEMP/candidate/openapi" \
              "$RUNNER_TEMP/oasdiff" "$RUNNER_TEMP/openapi-compatibility"
            status=$?
            set -e
            if [[ $status -eq 10 ]]; then
              scripts/release/check-break-policy.py OpenAPI-Migration \
                "$previous_revision" "$RELEASE_REVISION"
            elif [[ $status -ne 0 ]]; then
              exit "$status"
            fi
          fi
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.44.0
      - name: Build exact images and inventories
        run: scripts/release/build-images.sh "$RELEASE_VERSION" "$RELEASE_REVISION" "$RUNNER_TEMP/candidate/images"
      - name: Evaluate known vulnerabilities
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate repos/${{ github.repository }}/dependabot/alerts \
            --jq '.[]' >"$RUNNER_TEMP/dependabot-alerts.jsonl"
          jq --slurp . "$RUNNER_TEMP/dependabot-alerts.jsonl" \
            >"$RUNNER_TEMP/dependabot-alerts.json"
          scripts/release/check-vulnerabilities.py \
            "$RUNNER_TEMP/dependabot-alerts.json" release/vulnerability-exceptions.json \
            "$RUNNER_TEMP/candidate/vulnerability-report.json"
      - name: Create candidate release manifest
        run: |
          arguments=()
          if [[ -s "$RUNNER_TEMP/previous-release-manifest.json" ]]; then
            arguments+=(--previous-version "$(jq --raw-output .version "$RUNNER_TEMP/previous-release-manifest.json")")
            arguments+=(--previous-revision "$(jq --raw-output .sourceRevision "$RUNNER_TEMP/previous-release-manifest.json")")
          fi
          scripts/release/create-manifest.py \
            "$RELEASE_VERSION" "$RELEASE_REVISION" "$RUNNER_TEMP/candidate" "${arguments[@]}"
          cp "$RUNNER_TEMP/previous-release-manifest.json" "$RUNNER_TEMP/candidate/previous-release-manifest.json"
      - name: Upload validated candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cardo-${{ inputs.version }}-${{ inputs.revision }}
          path: ${{ runner.temp }}/candidate
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: candidate
    outputs:
      central_state: ${{ steps.central.outputs.state }}
      github_prerelease: ${{ needs.candidate.outputs.github_prerelease }}
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.revision }}
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Download validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cardo-${{ inputs.version }}-${{ inputs.revision }}
          path: ${{ runner.temp }}/candidate
      - name: Restore an exact prior signed bundle
        id: prior-central
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/prior-central"
          if gh release download "v$RELEASE_VERSION" \
            --pattern central-bundle.zip \
            --dir "$RUNNER_TEMP/prior-central" 2>/dev/null; then
            gh release download "v$RELEASE_VERSION" \
              --pattern release-manifest.json \
              --dir "$RUNNER_TEMP/prior-central"
            gh release download "v$RELEASE_VERSION" \
              --pattern central-deployment-id.txt \
              --dir "$RUNNER_TEMP/prior-central" 2>/dev/null || true
            mkdir -p "$RUNNER_TEMP/signed/maven-repository"
            cp "$RUNNER_TEMP/prior-central/central-bundle.zip" "$RUNNER_TEMP/signed/central-bundle.zip"
            unzip -q "$RUNNER_TEMP/signed/central-bundle.zip" -d "$RUNNER_TEMP/signed/maven-repository"
            if [[ -f "$RUNNER_TEMP/prior-central/central-deployment-id.txt" ]]; then
              cp "$RUNNER_TEMP/prior-central/central-deployment-id.txt" "$RUNNER_TEMP/central-deployment-id.txt"
            fi
            echo 'restored=true' >>"$GITHUB_OUTPUT"
          else
            echo 'restored=false' >>"$GITHUB_OUTPUT"
          fi
      - name: Validate immutable release request again
        run: |
          if [[ '${{ steps.prior-central.outputs.restored }}' == true ]]; then
            manifest="$RUNNER_TEMP/prior-central/release-manifest.json"
            bundle="$RUNNER_TEMP/prior-central/central-bundle.zip"
          else
            manifest="$RUNNER_TEMP/candidate/release-manifest.json"
            bundle="$RUNNER_TEMP/candidate/central-bundle.zip"
          fi
          scripts/release/validate-request.sh "$RELEASE_VERSION" "$RELEASE_REVISION" \
            "$manifest" "$bundle" "$RUNNER_TEMP/candidate/central-bundle.zip"
      - name: Preflight private GHCR package state
        env:
          GHCR_PUBLISH_TOKEN: ${{ secrets.GHCR_PUBLISH_TOKEN }}
        run: scripts/release/check-ghcr-package-state.sh
      - name: Create or validate immutable release tag
        run: |
          tag="v$RELEASE_VERSION"
          if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              tag --annotate "$tag" "$RELEASE_REVISION" \
              --message "Cardo $RELEASE_VERSION"
            git push origin "refs/tags/$tag"
          fi
          tag_revision=$(git ls-remote --tags origin "refs/tags/$tag^{}" | awk '{print $1}')
          [[ -n $tag_revision && $tag_revision == "$RELEASE_REVISION" ]] || {
            echo "$tag does not identify the requested revision through an annotated remote tag" >&2
            exit 1
          }
      - name: Import release signing key
        if: steps.prior-central.outputs.restored == 'false'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          [[ -n "$GPG_PRIVATE_KEY" ]] || { echo 'GPG_PRIVATE_KEY is not configured' >&2; exit 1; }
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
      - name: Rebuild signed Central bundle
        if: steps.prior-central.outputs.restored == 'false'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          [[ -n "$MAVEN_GPG_PASSPHRASE" ]] || { echo 'GPG_PASSPHRASE is not configured' >&2; exit 1; }
          scripts/release/stage-maven.sh \
            "$RELEASE_VERSION" "$RELEASE_REVISION" "$RUNNER_TEMP/signed" --signed
          scripts/release/verify-consumer.sh "$RELEASE_VERSION" "$RUNNER_TEMP/signed/maven-repository"
          scripts/release/validate-request.sh "$RELEASE_VERSION" "$RELEASE_REVISION" \
            "$RUNNER_TEMP/candidate/release-manifest.json" \
            "$RUNNER_TEMP/candidate/central-bundle.zip" \
            "$RUNNER_TEMP/signed/central-bundle.zip"
      - name: Check immutable Central state
        id: central
        run: |
          state=$(scripts/release/check-central-state.sh \
            "$RELEASE_VERSION" "$RUNNER_TEMP/signed/maven-repository")
          echo "state=$state" >>"$GITHUB_OUTPUT"
      - name: Preserve signed Central candidate before upload
        if: steps.central.outputs.state == 'absent' && steps.prior-central.outputs.restored == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ needs.candidate.outputs.github_prerelease }}
        run: |
          cp "$RUNNER_TEMP/signed/central-bundle.zip" "$RUNNER_TEMP/candidate/central-bundle.zip"
          previous=()
          previous_version=$(jq --raw-output '.previousStable.version // empty' \
            "$RUNNER_TEMP/candidate/release-manifest.json")
          if [[ -n "$previous_version" ]]; then
            previous+=(--previous-version "$previous_version")
            previous+=(--previous-revision "$(jq --raw-output .previousStable.sourceRevision \
              "$RUNNER_TEMP/candidate/release-manifest.json")")
          fi
          scripts/release/create-manifest.py "$RELEASE_VERSION" "$RELEASE_REVISION" \
            "$RUNNER_TEMP/candidate" "${previous[@]}"
          notes="$RUNNER_TEMP/staged-release-notes.md"
          printf 'Cardo %s staging evidence\n\nSource revision: %s\n\nCentral publication is pending. Inspect the Publisher Portal before any retry; never upload a second deployment for this version.\n' \
            "$RELEASE_VERSION" "$RELEASE_REVISION" >"$notes"
          gh release create "v$RELEASE_VERSION" --draft --verify-tag \
            --prerelease="$RELEASE_PRERELEASE" \
            --title "Cardo $RELEASE_VERSION" --notes-file "$notes" \
            "$RUNNER_TEMP/signed/central-bundle.zip" \
            "$RUNNER_TEMP/candidate/release-manifest.json"
      - name: Upload Central bundle for manual publication
        if: steps.central.outputs.state == 'absent' && steps.prior-central.outputs.restored == 'false'
        env:
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release/upload-central.sh "$RELEASE_VERSION" \
            "$RUNNER_TEMP/signed/central-bundle.zip" "$RUNNER_TEMP/central-deployment-id.txt"
          gh release upload "v$RELEASE_VERSION" \
            "$RUNNER_TEMP/central-deployment-id.txt"
          {
            echo '### Manual Central approval required'
            echo
            echo 'Publish the validated USER_MANAGED deployment in Central, then rerun this exact version and revision.'
          } >>"$GITHUB_STEP_SUMMARY"
      - name: Report an existing Central deployment awaiting publication
        if: steps.central.outputs.state == 'absent' && steps.prior-central.outputs.restored == 'true'
        run: |
          [[ -s "$RUNNER_TEMP/central-deployment-id.txt" ]] || {
            echo 'The signed bundle was preserved before upload, but no deployment ID was recorded.' >&2
            echo 'Inspect the Central Publisher Portal; do not create another deployment automatically.' >&2
            exit 1
          }
          {
            echo '### Central publication is still pending'
            echo
            echo "Deployment: $(cat "$RUNNER_TEMP/central-deployment-id.txt")"
            echo 'Publish that existing USER_MANAGED deployment, then rerun this exact version and revision.'
          } >>"$GITHUB_STEP_SUMMARY"
      - name: Stop after Central staging
        if: steps.central.outputs.state == 'absent'
        run: exit 0
      - name: Install Syft
        if: steps.central.outputs.state == 'published'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.44.0
      - name: Rebuild and publish immutable images
        if: steps.central.outputs.state == 'published'
        env:
          GH_TOKEN: ${{ github.token }}
          GHCR_PUBLISH_TOKEN: ${{ secrets.GHCR_PUBLISH_TOKEN }}
        run: |
          scripts/release/build-images.sh "$RELEASE_VERSION" "$RELEASE_REVISION" "$RUNNER_TEMP/final-images"
          scripts/release/verify-image-rebuild.sh \
            "$RUNNER_TEMP/candidate/images" "$RUNNER_TEMP/final-images"
          cp -R "$RUNNER_TEMP/final-images/." "$RUNNER_TEMP/candidate/images/"
          previous=()
          mkdir -p "$RUNNER_TEMP/prior-draft"
          if gh release download "v$RELEASE_VERSION" --pattern release-manifest.json \
            --dir "$RUNNER_TEMP/prior-draft" 2>/dev/null; then
            previous+=("$RUNNER_TEMP/prior-draft/release-manifest.json")
          fi
          set +e
          scripts/release/publish-images.sh "$RELEASE_VERSION" \
            "$RUNNER_TEMP/final-images/images.json" "$RUNNER_TEMP/image-digests.json" "${previous[@]}"
          publish_status=$?
          set -e
          if [[ $publish_status -ne 0 && -s "$RUNNER_TEMP/image-digests.json" ]]; then
            cp "$RUNNER_TEMP/signed/central-bundle.zip" "$RUNNER_TEMP/candidate/central-bundle.zip"
            arguments=()
            previous_version=$(jq --raw-output '.previousStable.version // empty' \
              "$RUNNER_TEMP/candidate/release-manifest.json")
            if [[ -n "$previous_version" ]]; then
              arguments+=(--previous-version "$previous_version")
              arguments+=(--previous-revision "$(jq --raw-output .previousStable.sourceRevision \
                "$RUNNER_TEMP/candidate/release-manifest.json")")
            fi
            scripts/release/create-manifest.py "$RELEASE_VERSION" "$RELEASE_REVISION" \
              "$RUNNER_TEMP/candidate" --image-digests "$RUNNER_TEMP/image-digests.json" "${arguments[@]}"
            gh release upload "v$RELEASE_VERSION" --clobber \
              "$RUNNER_TEMP/candidate/release-manifest.json"
            exit "$publish_status"
          fi
      - name: Preserve partial image digest evidence
        if: failure() && steps.central.outputs.state == 'published'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cardo-${{ inputs.version }}-${{ inputs.revision }}-partial-image-digests-${{ github.run_attempt }}
          path: ${{ runner.temp }}/image-digests.json
          if-no-files-found: error
          retention-days: 90
      - name: Finalize and attest release evidence
        id: image-digests
        if: steps.central.outputs.state == 'published'
        run: |
          cp "$RUNNER_TEMP/signed/central-bundle.zip" "$RUNNER_TEMP/candidate/central-bundle.zip"
          previous=()
          previous_version=$(jq --raw-output '.previousStable.version // empty' \
            "$RUNNER_TEMP/candidate/release-manifest.json")
          if [[ -n "$previous_version" ]]; then
            previous+=(--previous-version "$previous_version")
            previous+=(--previous-revision "$(jq --raw-output .previousStable.sourceRevision \
              "$RUNNER_TEMP/candidate/release-manifest.json")")
          fi
          scripts/release/create-manifest.py "$RELEASE_VERSION" "$RELEASE_REVISION" \
            "$RUNNER_TEMP/candidate" --image-digests "$RUNNER_TEMP/image-digests.json" "${previous[@]}"
          scripts/release/create-checksums.sh "$RUNNER_TEMP/candidate/checksums.sha256" \
            "$RUNNER_TEMP/signed/central-bundle.zip" \
            "$RUNNER_TEMP/candidate/release-manifest.json" \
            "$RUNNER_TEMP/candidate/vulnerability-report.json" \
            "$RUNNER_TEMP/candidate/images/identity-image.cyclonedx.json" \
            "$RUNNER_TEMP/candidate/images/invite-image.cyclonedx.json" \
            "$RUNNER_TEMP/candidate/images/billing-image.cyclonedx.json"
          echo "json=$(jq --compact-output . "$RUNNER_TEMP/image-digests.json")" >>"$GITHUB_OUTPUT"
      - name: Attest release files
        if: steps.central.outputs.state == 'published'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/signed/central-bundle.zip
            ${{ runner.temp }}/candidate/release-manifest.json
            ${{ runner.temp }}/candidate/checksums.sha256
            ${{ runner.temp }}/candidate/images/*-image.cyclonedx.json
      - name: Attest Identity image
        if: steps.central.outputs.state == 'published'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/lutzseverino/cardo/identity
          subject-digest: ${{ fromJSON(steps.image-digests.outputs.json).identity }}
          push-to-registry: false
      - name: Attest Invite image
        if: steps.central.outputs.state == 'published'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/lutzseverino/cardo/invite
          subject-digest: ${{ fromJSON(steps.image-digests.outputs.json).invite }}
          push-to-registry: false
      - name: Attest Billing image
        if: steps.central.outputs.state == 'published'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/lutzseverino/cardo/billing
          subject-digest: ${{ fromJSON(steps.image-digests.outputs.json).billing }}
          push-to-registry: false
      - name: Create or update draft GitHub release
        if: steps.central.outputs.state == 'published'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ needs.candidate.outputs.github_prerelease }}
        run: |
          cp "$RUNNER_TEMP/signed/central-bundle.zip" "$RUNNER_TEMP/candidate/central-bundle.zip"
          notes="$RUNNER_TEMP/release-notes.md"
          printf '# Cardo %s\n\n%s\n\nSource revision: %s\n' \
            "$RELEASE_VERSION" "$RELEASE_NOTES" "$RELEASE_REVISION" >"$notes"
          assets=(
            "$RUNNER_TEMP/candidate/central-bundle.zip"
            "$RUNNER_TEMP/candidate/release-manifest.json"
            "$RUNNER_TEMP/candidate/checksums.sha256"
            "$RUNNER_TEMP/candidate/vulnerability-report.json"
            "$RUNNER_TEMP/candidate/images/identity-image.cyclonedx.json"
            "$RUNNER_TEMP/candidate/images/invite-image.cyclonedx.json"
            "$RUNNER_TEMP/candidate/images/billing-image.cyclonedx.json"
          )
          if gh release view "v$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release edit "v$RELEASE_VERSION" \
              --prerelease="$RELEASE_PRERELEASE" \
              --title "Cardo $RELEASE_VERSION" --notes-file "$notes"
            gh release upload "v$RELEASE_VERSION" --clobber "${assets[@]}"
          else
            gh release create "v$RELEASE_VERSION" --draft --verify-tag \
              --prerelease="$RELEASE_PRERELEASE" \
              --title "Cardo $RELEASE_VERSION" --notes-file "$notes" "${assets[@]}"
          fi
      - name: Preserve final release manifest for private verification
        if: steps.central.outputs.state == 'published'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cardo-${{ inputs.version }}-${{ inputs.revision }}-final-release
          path: ${{ runner.temp }}/candidate/release-manifest.json
          if-no-files-found: error
          retention-days: 7
  verify-private-runtime:
    needs: publish
    if: needs.publish.outputs.central_state == 'published'
    environment: release
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.revision }}
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Download final release manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cardo-${{ inputs.version }}-${{ inputs.revision }}-final-release
          path: ${{ runner.temp }}/release
      - name: Prove private image access boundary
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          scripts/release/verify-private-release.sh \
            "$RUNNER_TEMP/release/release-manifest.json" lutzseverino

  finalize:
    needs: [publish, verify-private-runtime]
    if: needs.publish.outputs.central_state == 'published'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Publish verified GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ needs.publish.outputs.github_prerelease }}
        run: |
          gh release edit "v$RELEASE_VERSION" --repo "${{ github.repository }}" \
            --prerelease="$RELEASE_PRERELEASE" --draft=false
