spring:
  application:
    name: cardo-invite
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardo}
    username: ${SPRING_DATASOURCE_USERNAME:cardo}
    password: ${SPRING_DATASOURCE_PASSWORD:cardo}
  flyway:
    table: flyway_schema_history_invite
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration,classpath:db/authorization/publications
    placeholders:
      authorizationSchema: invite_events
  jpa:
    hibernate:
      ddl-auto: validate
  modulith:
    events:
      jdbc:
        schema: invite_events
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${cardo.invite.keycloak.base-url}/realms/${cardo.invite.keycloak.realm}}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

cardo:
  api:
    version: v1
    base-path: /api/${cardo.api.version}
  invite:
    completion:
      dispatch-delay: ${INVITATION_COMPLETION_DISPATCH_DELAY:5s}
      poll-delay: ${INVITATION_COMPLETION_POLL_DELAY:15s}
      retry-base-delay: ${INVITATION_COMPLETION_RETRY_BASE_DELAY:5s}
      claim-lease: ${INVITATION_COMPLETION_CLAIM_LEASE:1m}
      max-attempts: ${INVITATION_COMPLETION_MAX_ATTEMPTS:12}
      batch-size: ${INVITATION_COMPLETION_BATCH_SIZE:50}
    delivery:
      from: ${INVITE_MAIL_FROM:no-reply@localhost}
    invitation:
      ttl: 72h
      acceptance-clock-skew: 5m
    product-callers:
      allowed-client-ids: ${INVITE_PRODUCT_CLIENT_IDS:}
    keycloak:
      base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
      realm: ${KEYCLOAK_REALM:cardo}
      client-id: ${KEYCLOAK_INVITE_CLIENT_ID:cardo-invite}
      client-secret: ${KEYCLOAK_INVITE_CLIENT_SECRET:}
  identity:
    client:
      base-url: ${IDENTITY_BASE_URL:http://localhost:8081/api/v1}
      service-token-scope: ${IDENTITY_SERVICE_TOKEN_SCOPE:identity}

server:
  port: ${INVITE_PORT:8083}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    build:
      enabled: true

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
